<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>20단어 기억 테스트</title>
<style>
:root{
  --bg:#0f1020;
  --card:#1b1d36;
  --sub:#aeb4d6;
  --text:#ffffff;
  --accent:#8b5cf6;
  --accent2:#22c55e;
  --warn:#facc15;
  --bad:#fb7185;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;
  background:linear-gradient(135deg,#0f1020,#1c1235,#081827);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.app{
  width:100%;
  max-width:760px;
  min-height:92vh;
  background:rgba(27,29,54,.92);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:22px;
  box-shadow:0 24px 80px rgba(0,0,0,.35);
}
h1,h2,h3,p{margin-top:0}
h1{font-size:30px;margin-bottom:8px}
h2{font-size:25px;margin-bottom:12px}
p{line-height:1.55;color:var(--sub)}
button{
  width:100%;
  border:0;
  border-radius:16px;
  padding:16px;
  font-size:17px;
  font-weight:800;
  background:linear-gradient(135deg,var(--accent),#06b6d4);
  color:white;
  cursor:pointer;
  margin-top:12px;
}
.notice{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:18px;
  padding:16px;
  margin:16px 0;
  line-height:1.7;
  color:#e8e9ff;
}
input{
  width:100%;
  border:0;
  border-radius:14px;
  padding:14px;
  font-size:17px;
  outline:none;
}
.word{
  height:48vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(54px,14vw,96px);
  font-weight:900;
  letter-spacing:-.05em;
}
.progress{
  color:var(--sub);
  display:flex;
  justify-content:space-between;
  font-size:15px;
}
.timer{
  font-size:36px;
  font-weight:900;
  color:var(--warn);
  margin:8px 0 14px;
}
.distract{
  min-height:48vh;
  border-radius:24px;
  background:linear-gradient(135deg,#f472b6,#fde047,#38bdf8);
  color:#151515;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  overflow:hidden;
}
.distract .emoji{
  font-size:64px;
  animation:bounce 1.1s infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0) rotate(0)}
  50%{transform:translateY(-10px) rotate(5deg)}
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:14px;
}
.cell{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:9px;
}
.cell label{
  display:block;
  font-size:12px;
  color:var(--sub);
  margin-bottom:5px;
}
.cell input{
  padding:11px;
  font-size:16px;
}
.result{
  background:rgba(255,255,255,.08);
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  text-align:left;
}
.result h3{margin-bottom:8px}
.good{color:var(--accent2)!important}
.warn{color:var(--warn)!important}
.bad{color:var(--bad)!important}
.center{text-align:center}
@media (min-width:700px){
  .grid{grid-template-columns:repeat(5,1fr)}
  .app{min-height:auto}
}
</style>
</head>
<body>
<main class="app">
  <div id="app"></div>
</main>

<script>
const WORD_POOL = [
"사과","우산","기차","고양이","바다","연필","초콜릿","달빛","운동화","풍선",
"도서관","커피","거울","비행기","눈사람","피아노","햄버거","무지개","시계","숲",
"라디오","수박","노트북","양말","호랑이","버스","케이크","구름","열쇠","사진",
"편지","마이크","바나나","별","의자","모자","강아지","지갑","캠핑","로봇",
"장미","오렌지","문어","냉장고","촛불","지도","수첩","종이컵","스케이트","해바라기"
];

let words=[];
let idx=0;
const wordSec=3;
const distractSec=30;
const recallSec=60;
let expectedCount=0;
let recallTimer=null;
let submitted=false;

const app=document.getElementById("app");

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

function renderIntro(){
  app.innerHTML=`
    <div class="center">
      <h1>20단어 기억 테스트</h1>
      <p>화면에 나타나는 단어를 기억해주세요.</p>
    </div>

    <div class="notice">
      1. 단어 20개가 순서대로 나타납니다.<br>
      2. 중간 화면을 본 뒤, 예상 기억 개수를 입력합니다.<br>
      3. 기억나는 단어를 제한 시간 안에 적습니다.<br>
      4. 결과를 확인합니다.
    </div>

    <button onclick="start()">시작하기</button>
  `;
}

function start(){
  words=shuffle(WORD_POOL).slice(0,20);
  idx=0;
  submitted=false;
  showWord();
}

function showWord(){
  if(idx>=words.length){ distraction(); return; }
  app.innerHTML=`
    <div class="progress">
      <span>단어 보기</span>
      <span>${idx+1}/20</span>
    </div>
    <div class="word">${words[idx]}</div>
  `;
  idx++;
  setTimeout(showWord,wordSec*1000);
}

function distraction(){
  let sec=distractSec;
  app.innerHTML=`
    <div class="progress">
      <span>잠시 쉬어가기</span>
      <span id="dTimer">${sec}초</span>
    </div>
    <div class="distract">
      <div class="emoji">🐥✨🔥</div>
      <h2>잠시만 기다려주세요</h2>
      <p style="color:#222;font-weight:700">곧 다음 단계로 이동합니다.</p>
    </div>
  `;
  const t=setInterval(()=>{
    sec--;
    document.getElementById("dTimer").textContent=sec+"초";
    if(sec<=0){clearInterval(t); askCount();}
  },1000);
}

function askCount(){
  app.innerHTML=`
    <h2>몇 개 기억날 것 같나요?</h2>
    <div class="notice">
      아직 단어를 적지 말고,<br>
      먼저 <b>기억할 수 있을 것 같은 개수</b>를 입력해주세요.
    </div>
    <input id="count" type="number" min="0" max="20" placeholder="예: 12" inputmode="numeric">
    <button onclick="askWords()">다음</button>
  `;
}

function askWords(){
  expectedCount=Number(document.getElementById("count").value||0);
  let boxes="";
  for(let i=1;i<=20;i++){
    boxes+=`
      <div class="cell">
        <label>${i}번</label>
        <input id="word${i}" type="text" autocomplete="off">
      </div>`;
  }
  app.innerHTML=`
    <h2>기억나는 단어를 적어주세요</h2>
    <div class="timer">남은 시간 <span id="rTimer">${recallSec}</span>초</div>
    <div class="notice">
      순서는 상관없습니다.<br>
      모르는 칸은 비워두세요.<br>
      한 칸에 한 단어씩 적어주세요.
    </div>
    <div class="grid">${boxes}</div>
    <button onclick="result()">결과 확인</button>
  `;
  startRecallTimer();
}

function startRecallTimer(){
  let sec=recallSec;
  recallTimer=setInterval(()=>{
    sec--;
    const el=document.getElementById("rTimer");
    if(el) el.textContent=sec;
    if(sec<=0){
      clearInterval(recallTimer);
      result();
    }
  },1000);
}

function normalize(text){
  return text.trim().replace(/\s/g,"");
}

function getMeta(expected,actual){
  const diff=expected-actual;
  if(diff>=4) return ["과신형","warn","예상보다 실제 기억 개수가 적습니다."];
  if(diff<=-4) return ["과소평가형","bad","예상보다 실제 기억 개수가 많습니다."];
  return ["정확형","good","예상과 실제가 비슷합니다."];
}

function result(){
  if(submitted) return;
  submitted=true;
  if(recallTimer) clearInterval(recallTimer);

  const entered=[];
  for(let i=1;i<=20;i++){
    const el=document.getElementById("word"+i);
    if(el && el.value.trim()) entered.push(normalize(el.value));
  }

  const normalizedWords=words.map(normalize);
  const correct=[...new Set(entered.filter(x=>normalizedWords.includes(x)))];
  const wrong=[...new Set(entered.filter(x=>!normalizedWords.includes(x)))];
  const correctOriginal=words.filter(w=>correct.includes(normalize(w)));
  const missed=words.filter(w=>!correct.includes(normalize(w)));
  const accuracy=100-Math.min(100,Math.round(Math.abs(expectedCount-correct.length)/20*100));
  const meta=getMeta(expectedCount,correct.length);

  app.innerHTML=`
    <h2>결과</h2>
    <div class="result">
      <p><b>실제 기억 개수:</b> ${correct.length}/20개</p>
      <p><b>예상 기억 개수:</b> ${expectedCount}개</p>
      <p><b>메타인지 정확도:</b> ${accuracy}%</p>
      <p class="${meta[1]}"><b>${meta[0]}</b> - ${meta[2]}</p>
    </div>

    <div class="result">
      <h3>맞힌 단어</h3>
      <p>${correctOriginal.join(", ") || "없음"}</p>
    </div>

    <div class="result">
      <h3>목록에 없던 입력</h3>
      <p>${wrong.join(", ") || "없음"}</p>
    </div>

    <div class="result">
      <h3>놓친 단어</h3>
      <p>${missed.join(", ") || "없음"}</p>
    </div>

    <button onclick="renderIntro()">다시 하기</button>
  `;
}

renderIntro();
</script>
</body>
</html>
